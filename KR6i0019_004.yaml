body:
  text: 大隋北印度三藏闍那崛多譯南無無垢名稱如來多緻他毗富㘑毗富㘑若那毗富㘑莎呵南無法海濤波功德王如來多緻他三摩上三摩上三摩悉剃他細反帝莎呵南無法主王如來多緻他曷囉摩曷囉磨曷低吱吉離反囉膩莎呵南無瞿那雲如來多緻他瞿迷迷悉去聲瞿迷瞿摩瞿迷莎呵南無法功德如來多緻他室唎室唎室唎莎呵南無天冠如來多緻他一摩句㖑卓界反二摩句㖑達摩摩句㖑三莎呵南無智焰威功德如來多緻他一誓裔誓裔二闍耶鉢帝莎呵南無兩足尊如來多緻他一度磨度磨二度迷度迷三莎呵南無虛空聲如來多緻他一伽伽泥去伽伽泥二伽伽那娑迷去三莎呵四南無三漫平多生燈如來多緻他一三婆婆三婆婆二佛陀薩怟裔那莎呵南無豪功能形如來多緻他一漚迷漚迷並去聲二漚摩拔帝三莎呵南無寂鳴如來多緻他一瞿殺所界反下同瞿殺二佛陀瞿殺莎呵南無海功德如來多緻他一薩囉薩囉二施鞞莎呵南無日威如來多緻他一低嗜低嗜二低闍鉢帝三莎呵南無輿王如來多緻他一施鞞施鞞覆二莎呵南無相彌留如來多緻他一叉裔叉裔二羯磨叉裔三莎呵南無雲音鳴如來多緻他一胡嘍醯胡嘍醯二瞿沙胡嘍醯三莎呵南無法主王如來多緻他一因地唎因地唎二因陀囉鉢帝三莎呵南無瞿那王如來多緻他一瞿嬭悉奴界反瞿嬭二瞿拏三謨地帝三莎呵南無富彌留如來多緻他一不羅耶不囉耶二薩婆摩奴曷唎他三莎呵南無聲寂如來多緻他一奢彌奢彌二奢摩泥三莎呵南無光王如來多緻他一波羅波羅二波羅娑羅泥去三莎呵南無華積如來多緻他一鳩暮二鳩暮三鳩暮提四莎呵南無海胎藏如來多緻他一揭薜步隸反下同揭薜二怛他伽多揭薜三莎呵南無出生功德如來多緻他一三婆婆三婆婆二波羅尼陀那三婆婆三莎呵南無天主周羅摩尼胎藏如來多緻他一第薜第薜二第便陀羅三不視低四莎呵南無金山如來多緻他一綱引遮泥二綱遮泥三綱遮那地利施去四莎呵南無寶積如來多緻他一何囉上怛泥去二何囉怛泥若那何囉怛泥三莎呵南無法幢如來多緻他一淡磨淡磨二達摩淡磨莎呵南無財貨功德如來多緻他一尸利低誓二尸利低誓三尸利莎呵四南無智意如來多緻他一闍弊闍弊二闍婆泥三莎呵南無寂幢如來多緻他一羶帝羶音詩安反下悉同二羶帝三波羅羶帝四莎呵南無奢摩他幢如來多緻他一吉利吉利二吉都囉誓三莎呵南無寂燈功德如來多緻他一奢摩泥覆二波羅奢摩泥覆三羶都婆婆四覆五莎呵南無無邊明王如來多緻他一阿婆婆引細二阿婆婆引細三阿婆婆娑迦囉泥四莎呵南無雲徐步如來多緻他一毗婢毗婢二毗嵐毗低三莎呵南無日威如來多緻他一蘇嚧蘇嚧二蘇利踰地低三莎呵南無法燈功德彌嘍如來多緻他一地蜱地蜱二達摩波地蜱三莎呵四不嗜低五莎呵南無師子遊戲智燈王如來多緻他一四迷去四迷二佛陀僧伽四迷三莎呵南無普求那雲如來多緻他一彌嘍彌嘍佛陀彌嘍二莎呵南無虛空思如來多緻他一伽伽泥去伽伽泥二伽伽那引毗首陀耶三莎呵南無出生莊嚴如來多緻他一三婆薜覆二三婆薜覆三三婆婆鼻由奚覆四莎呵南無雷法海震鳴如來多緻他一伽唎囉引闍泥去二伽唎囉闍泥去三若那伽唎囉闍泥去四莎呵南無法界音鳴如來多緻他一陀囉陀囉二陀囉尼槃悌三莎呵南無化雲如來多緻他一尼彌尼彌二若那尼彌三莎呵南無善音功德如來多緻他一婆婆離二婆婆離去三佛陀婆婆離四莎呵南無普方威如來多緻他一多囉多囉二佛陀提瑟魑敕一反泥去聲三莎呵南無法海如來多緻他一三謨垤田結反唎二三謨垤唎三達摩陀妬三謨垤唎四莎呵南無普音聲如來多緻他一三婆去鞞去二三婆鞞三拔都佛陀地瑟吒託麻反泥那去四莎呵南無瞿那海如來多緻他一瞿泥去瞿泥二佛陀三婆婆瞿泥三莎呵南無功德燈如來多緻他一尸唎尸唎二鉢囉提波尸唎三莎呵南無耆市尸反那日如來多緻他一耆泥去耆泥二耆那三蘇唎裔四莎呵南無廣雲如來多緻他一毗富隸毗富隸二伽伽那毗富隸三莎呵南無寶功燈明瞿那相如來鉢囉地長聲閉一鉢囉地閉二尸利底闍三鉢囉地閉四莎呵南無成光明如來多緻他一悉地悉地二蘇悉地三謨折之列反儞四謨剎儞五目訖底六毗目訖底七阿摩隸八毗摩隸九瞢伽隸奚囒娘伽鞞去聲十何囉底那引伽鞞去十一薩婆他娑達泥去十二波囉摩囉他婆達泥十三摩那賜十四摩訶摩那賜十五阿陀浮底十六頞底耶浮底去十七毗多拔裔十八蘇拔唎泥去十九拔囉摩瞿灑二十拔囉摩阿厨灑帝二十一薩婆囉挮數二十二阿波囉祇二十三薩婆多囉二十四阿波囉底呵底二十五折之列反妬殺灑致二十六佛陀俱致毗婆殺帝二十七那摩薩婆悉陀那去聲二十八怛都渴反他揭多那二十九莎呵説此陀羅尼時彼等一切諸佛世尊而讚嘆言善哉善哉善丈夫汝今乃説是甚深陀羅尼乎若有讀誦受持此陀羅尼者常廣思惟彼族姓子當得此等諸佛世尊恆常滿足彼之所願爾時香明如來以其舌根遍覆三千大千世界然後告彼七十七那由他菩薩言若有良家子良家女受持此陀羅尼章句若讀若誦隨力當作供養彼為此等諸佛世尊所有心願皆悉滿足爾時教發菩薩摩訶薩白香光如來作如是言世尊彼等云何而作供養供養彼等諸佛如來作是語已世尊告彼教發菩薩作如是言良家姓子若有初發心行菩薩初發業者又欲得滿一切願者彼於晨朝時以瞿摩塗地隨力香花而供養已去離世談晝三遍夜三遍誦彼諸佛如來名號及此陀羅尼而彼即得現見諸法漸得滅除一切業障以諸如來真實持故南無月光如來多緻他一氈達唎皆羅施反二氈達唎三蘇氈達唎四沫帝氈達唎五氈達唎吱吉支反囉尼泥去六彌唎彌唎七佛陀提瑟呹耻一反帝八四履四履達摩提瑟呹帝九莎呵十若有善男子善女人於晨朝時常當精勤專念彼等如來名號而彼人輩四萬劫常識宿命亦不忘失菩提之心南無一切趣清淨王如來多緻他一輸達儞輸達儞儞字悉年隸反薩婆波頗毗輸達儞輸悌毗輸悌薩婆達摩毗輸悌莎呵若有善男子善女人常能受持此如來名號精勤憶念不忘失者即得現見一切諸法盡諸業障及盡諸惡以佛真實住持力故當於十四俱致世中常憶宿命乃至菩提善根亦不窮盡南無清淨眼如來多緻他一斫芻斫芻二若那斫芻三莎呵諸莎則長聲呵則去聲若善男子善女人持此如來之名號者彼於世間當作眼目常能憶持四十俱致宿命之事乃至道場善根不盡南無香象光王如來多緻他一揭誓揭誓二揭誓延以佃反悌唎三莎呵爾時勝聚菩薩白佛言若有善男子善女人持此香象光王如來名號者彼於十三俱致歲中身出香氣不曾休息亦不廢忘菩提之心南無花相如來多緻他一布澀閉二布澀閉三蘇引布澀閉四莎呵此陀羅尼多有功能以陀羅尼呪華二十一遍如所備具向如來塔中散之彼人所有心願皆得滿足復盡一切業障南無治地王如來多著他一達唎達唎二達囉尼盤地三莎呵若有人持此如來名字及此陀羅尼章句彼人當滿一切心願誦此呪一百八遍即當一切諸地方所皆成結界隨得供具供養如來即滿一切所有諸願有佛名日月燈明現在説法人師子若能持是佛名號更不生諸惡趣中有佛名日月燈光現在説法人師子若能持彼佛名號當得總持能巧知有佛名曰電燈明現在説法人師子若能持彼佛名者不曾生於惡趣中有佛名曰最勝燈現在説法人師子若能持彼佛名號諸相未曾有缺少有佛名曰住真實現在説法人師子若能持彼佛名號其口常出優鉢香有佛名曰智燈明現在説法人師子若能持彼佛名號大得行行於智中有佛名曰燈明主現在説法人師子若能持彼佛名號當照世間猶如燈有佛名曰威德住現在説法人師子若能持彼佛名號一切諸方威顯赫有佛名曰陀羅住現在説法人師子若能持彼佛名號令衆甘露得充足有佛名曰空燈明現在説法人師子若能持彼佛名號能令驚怖著有者有佛名曰實燈明現在説法人師子若能持彼佛名號當説于經不染著有佛名曰實燈號現在説法人師子若能持彼佛名號驚怖一切諸外道有佛名曰誓空行現在説法人師子若有持彼佛名號能脫多數千家生有佛名曰盡邊際現在説法人師子若有持彼佛名號當得速知眼邊際有佛名曰盡邊際現在説法人師子若有持彼佛名號當能速知耳邊際有佛名曰有邊際現在説法人師子若有持彼佛名號當能速知有眼際有佛名曰邊際德現在説法人師子若有持彼佛名號當得速知眼邊際有佛名曰轉功德現在説法人師子若有持彼佛名號當得速知轉眼處有佛名曰離功德現在説法人師子若有持彼佛名號當得速知眼離處有佛名曰無物德現在説法人師子若有持彼佛名號當能速知眼無物有佛名曰無生德現在説法人師子若能持彼佛名號當得速知眼無生有佛名曰滅功德現在説法人師子若能持彼佛名號當得速知眼寂處有佛名曰不取德現在説法人師子若能持彼佛名號當得速知眼不取二百如來有佛名曰眼盡邊現在説法人師子若能持彼佛名號當得盡知耳邊際有佛名曰耳盡際現在説法人師子若能持彼佛名號當能得知鼻邊際有佛名曰鼻邊際現在説法人師子若有持彼佛名號當能速知舌邊際有佛名曰舌邊際現在説法人師子若有持彼佛名號當能顯知身邊際有佛名曰身邊際現在説法人師子若能持彼佛名號當能顯知心邊際有佛名曰心邊際現在説法人師子若能持彼佛名號當得顯知色邊際有佛名曰色邊際現在説法人師子若能持彼佛名號當得顯知聲邊際有佛名曰聲邊際現在説法人師子若能持彼佛名號當得顯知香邊際有佛名曰香邊際現在説法人師子若能持彼佛名號當得顯知味邊際有佛名曰味邊際現在説法人師子若能持彼佛名號當得顯知觸邊際有佛名曰觸邊際現在説法人師子若有持彼佛名號當得顯知盡邊際有佛名曰盡邊際現在説法人師子若能持彼佛名號當得顯知地邊際有佛名曰地邊際現在説法人師子若能持彼佛名號當得顯知水邊際有佛名曰水邊際現在説法人師子若能持彼佛名號當得顯知風邊際有佛名曰風邊際現在説法人師子若能持彼佛名號當得顯知火邊際有佛名曰火邊際現在説法人師子若能持彼佛名號當得顯知想邊際有佛名曰想邊際現在説法人師子若能持彼佛名號當得了知愛邊際有佛名曰愛邊際現在説法人師子若能持彼佛名號當得了知世邊際有佛名曰世邊際現在説法人師子若能持彼佛名號當得了知業邊際有佛名曰業邊際現在説法人師子若有持彼佛名號即得了知陰邊際有佛名曰陰邊際現在説法人師子若能持彼佛名號即得了知界邊際有佛名曰界邊際現在説法人師子若能持彼佛名號即得了知生邊際有佛名曰生邊際現在説法人師子若能持彼佛名號即得了知因邊際有佛名曰因邊際現在説法人師子若能持彼佛名號即得了知有邊際有佛名曰有邊際現在説法人師子若能持彼佛名號即得了知名邊際有佛名曰名邊際現在説法人師子若能持彼佛名號即得了知事邊際有佛名曰事邊際現在説法人師子若能持彼佛名號即得了知鳴邊際有佛名曰鳴邊際現在説法人師子若能持彼佛名號即得了知施邊際有佛名曰施邊際現在説法人師子若能持彼佛名號即得了知戒邊際有佛名曰戒邊