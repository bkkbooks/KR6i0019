body:
  text: 大隋北印度三藏闍那崛多譯南無恭敬泥摩耶如來南無不墮瞿那所生如來南無無量瞿那財如來南無那聚集如來南無大瞿那如來南無善化者如來南無寂者決了如來南無吼者如來南無雲藏如來南無怨藏如來南無普如來南無仙藏如來南無滿願如來南無滿足妙如來南無滿足一切瞿那如來南無喜吼如來南無踐蹈如來南無踐蹈魔如來南無頭陀塵如來南無無塵如來南無伏欲塵如來南無善朋友如來南無世友如來南無可信友如來南無善思義如來南無雜利如來南無不藏利如來南無日如來南無伏日如來南無最勝日如來南無叫聲日如來南無妙聲音如來南無妙叫聲如來南無無垢如來南無無垢阿梨耶如來南無無垢犢如來南無最勝色如來南無普端正如來南無一切面開色如來南無髻者如來南無寶髻如來南無多伽羅髻平等如來南無無避如來南無月者如來南無吉祥如來南無常吉祥如來南無不可伏如來南無幢不可降如來南無帝沙如來南無弗沙如來南無商主如來南無大商主如來南無作利益如來南無一切世利益如來南無勝主如來南無無主法行如來南無無憂如來南無除憂如來南無普智光明勝如來南無難伏無畏如來南無不可撲如來南無力士如來南無無相智慧如來南無虛空智如來南無斷語言如來南無語響如來南無福德所生如來南無福德所出如來南無大仙如來南無上意如來南無地主如來南無寂香音王如來南無無量仙如來南無天冠如來南無明冠如來南無意高上如來南無不墮如來南無不墮持如來南無那羅延如來南無渡彼岸如來南無乾闥婆如來南無鉢囉鼻迦耶如來南無淨足下如來南無虛空下如來南無化者如來南無善化者如來南無妙臍如來南無寂香善臍如來南無薩多伽拔帝如來南無寂靜拔提如來南無最意如來南無善意如來南無善思如來南無虛空思如來南無微妙語言如來南無輪語言如來南無敬供養如來南無梵天供養如來南無堅勇軍戎杖捨如來南無捨波浪如來一千四百佛已竟南無如教如來南無微妙如來南無可喜如來南無不被毀如來南無法海所生意如來南無迦葉如來南無拘留孫大如來南無初發心斷疑如來南無拔煩惱如來南無一切願度彼岸斷疑如來南無至無畏如來南無梵供養如來南無月者如來南無難降日如來南無火者如來南無毘沙門如來南無水者如來南無塵者如來南無常涅槃者如來南無無塵垢如來南無顯赫者如來南無梵者如來南無憍陳如如來南無阿芻婆夜如來南無動牢固如來南無戰勝如來南無名無比如來南無無愛性如來南無大悲如來南無常勇猛如來南無悲者如來南無翳月光如來南無樂曼陀羅香如來南無常水震鳴善音宿王開敷神通如來南無令散疑意如來南無無著處如來南無勝行如來南無金網莊嚴如來南無可得瓔珞如來南無娑多耶如來南無燈明如來南無栴檀如來南無分明如來南無大器如來南無毘葉婆斯那如來南無毘婆尸如來南無怖魔如來南無盧遮如來南無眾生虛空心形像如來南無調伏他如來南無成熟如來南無難調如來南無音聲者如來南無想者如來南無智焰熾身如來南無譬喻師子如來南無生者如來南無眾類愛如來南無歡喜如來南無喜增長如來南無明照如來南無遮婆那婆如來南無樹者如來南無閻浮威如來南無種種作如來南無最上行如來南無摩尼角如來南無調御如來南無智門音多藏如來南無普智行無攀緣如來南無妙寶如來南無滅下如來南無善圓滿月如來南無難勝智至如來南無功德如來南無不可思議如來南無雞薩羅如來南無頻申如來南無智者如來南無普行淨如來南無象耳如來南無象者如來南無虛空藏如來南無難破壞如來南無栴檀星如來南無無垢如來南無思法者如來南無法教藏如來南無發行如來南無日威莊嚴如來南無鉢唎鬀婆夜如來南無入禪定如來南無實言如來南無善住如來南無蹴蹋魔眾如來南無散無明如來南無盛威如來南無十方聞音鎧如來南無多摩羅拔如來南無無邊遊戲如來一千五百佛已竟南無無相如來南無勇行步象如來南無幢音如來南無親意如來南無大震聲如來南無水天如來南無提頭賴吒如來南無毘樓勒如來南無阿黎殺吒如來南無奢彌多如來南無閻浮那陀如來南無牟羅耶如來南無優鉢羅耶如來南無阿沙羅如來南無娑羅如來南無智勝如來南無毘多摩尼如來南無薩地利捨如來南無熾盛如來南無寂靜如來南無廣信如來南無教化菩薩如來南無寶功德如來南無辯才瓔珞思惟如來南無師子嚬申力如來南無雜所有如來南無與樂如來南無甘露者如來南無梵天者如來南無聲震吼鳴如來南無威決了如來南無破散魔力聲如來南無定住如來南無何囉多耶如來隋云樂南無熾盛者如來南無瞿那眾勝如來南無眾勝解脫如來南無日所生如來南無真體法上如來若有人於是等無邊阿僧祇所生諸佛如來名號身自受持讀誦思惟憶念奉修行者彼無眼患無耳鼻患舌患身患一切障礙皆悉清淨一切眾人不能調伏又於阿耨多羅三藐三菩提得不退轉一切十方諸佛世尊常當念彼為彼眾生常作守護彼等諸佛乃至夢中為彼示現不可思議巧智方便速得三昧陀羅尼門所生之處恒常不離諸佛世尊在於佛教大寶蓮花而取化生所生之處不曾捨離三十二大人相及以八十隨形之好神通五眼教化眾生清淨佛剎行波羅蜜及三十七助菩提法不離禪定無量三昧無色定等不捨諸力無畏辯才十八不共法大慈大悲大喜大捨無量阿僧祇依大隋上數法計一阿僧祇得億十京十諸佛法等皆悉不離彼如是諸佛世尊所有功德彼還如是功德具足即得安樂如是當得成阿耨多羅三藐三菩提南無無垢如來若稱彼名者即得智無盡南無日月燈如來若稱彼名者當得不退轉若有女人聞此佛名者即為最後女身更不復受南無甘露彌留如來若稱彼名者假令世界金鍱充滿及以七寶持用布施不及一歌羅分南無普香如來若稱彼佛如來名者一切毛孔出無量香當受一切香熏佛剎復得無量無邊福德南無淨光如來若稱彼佛如來名者所得功德假使以滿於恒河沙數世界之中七寶布施不及於其一歌羅分口稱彼佛如來名號南無法上如來若稱彼佛如來名者一切佛法悉皆滿足南無大眾者如來若稱彼佛如來名者一切佛法皆悉滿足南無無邊香光明如來稱彼名者得不退轉南無火光如來若稱彼佛如來名者晝夜增長無量福聚南無月燈明如來若稱彼佛如來名者於世界中堪為福田南無藥師琉璃光王如來若稱彼佛如來名者一切殃罪悉皆除滅南無普光最上功德稱聚王如來南無正住摩尼積聚王如來若有女人聞此二佛如來名者於一切處得捨女身復超四萬俱致劫波生死流轉於阿耨多羅三藐三菩提得不退轉常當不離見佛聞法供養眾僧於後世中即得出家尋當得成無礙辯才南無寶光月莊嚴首威德明自在王如來多緻他夜反他去一曷囉上怛泥去二曷囉上怛泥去三曷囉上怛娜翅吉支反囉上泥去四曷囉怛娜鉢囉低曼祑帝五曷囉上怛娜三婆鞞六曷囉上怛娜揭鞞七曷囉上怛怒去鐸揭帝八莎訶若有善男子善女人行菩薩乘者稱彼寶光月莊嚴首威德明自在王如來阿羅訶三藐三佛陀名者及此陀羅尼章句聞已信解彼捨此生得轉輪王位值佛出世見如來已當作無量供養供給修於梵行達到一切神通彼岸復得陀羅尼名曰十轉見如來已當作不思議供養當見恒河沙等諸佛超越如是俱致劫波生死流轉心不忘失於阿耨多羅三藐三菩提得身牢實如那羅延直有一骨難可屈折彼身金色以三十二大丈夫相而自莊嚴得梵音聲離無閑處當得閑處而說偈言若於七日七夜中稱彼如來名號者獲得清淨妙天眼無邊淨眼佛所稱獲得清淨天眼已彼人肉眼亦清淨當見無量無邊佛其數猶如恒河沙皆悉供養彼諸佛所聞彼法皆受持若眼所見諸人等莫不善言相慰喻往昔曾經供養佛并及所作不思議一切悉得心念持皆由聞彼如來號南無智炬如來南無金光積形如來南無實言如來南無常音震王諸如來等爾時普賢菩薩文殊尸利童子陀羅尼自在王菩薩執金剛手菩薩時四菩薩及智炬等四如來住在日月宮殿爾時日月二天子詣彼如來及菩薩所見彼如來等各坐寶莊嚴師子之座在閻浮檀輦上及彼諸菩薩爾時日月二天子各共思惟我等云何於此如來邊及諸菩薩所當得陀羅尼名曰與一切眾生光明散大黑闇最妙最上流布十方以彼威力與諸眾生作大光明時彼如來共彼菩薩即為說此陀羅尼呪僧𭈳余歌反涕婆去斫芻釵盧反下同一馱馱二斫芻鉢囉婆去三肚邏迷他去四迦邏他去五壹鬚他履反聃他甘反娑三我反六蘇囉上吒去七蘇囉上馱八蘇炭娑上九壹聃娑上十鞞羅十一經本元少第十二一句鞞羅鉢膩女利反十三遮𠺕謨唎多上膩十四阿長聲囉膩十五迦羅鉢膩十六迦羅鉢膩十七妬嚧徒四十八妬嚧妬嚧徒四十九陀素底陀素底二十地唎地唎二十一度嚧度嚧並去聲二十二豆邏豆邏二十三迦邏迦邏二十四薩他引娑去薩他引娑去二十五耆邏耆邏二十六耆羅引鉢夜二十七耆羅引鉢夜二十八陀素陀素二十九孫度三蘇含反步三十悉闥素三十一頞闥素三十二野闥素野闥娑引鉢泥去三十四樹引嚧唎三十五題引薩唎三十六哥去邏哥邏三十七翅吉豉反唎翅如上唎三十八厥嚧摩厥嚧摩三十九迦磨鉢泥去四十雞魯甊郎苟反雞魯甊四十一雞羅鉢泥去四十二羯迦唎羯迦唎四十三羅引嚕四十四復第四十五突甊犖苟反第突甊第四十六莫訶突甊第四十七歌邏歌邏四十八翅利翅吉豉反利四十九比比方之比怖霤賜五十比怖霤賜五十一馱嗽馱嗽五十二賀嗽賀嗽五十三賀娑簸膩五十四莎引呵五十五爾時普賢菩薩告日月二天子言諸族姓子此陀羅尼已曾八億八千萬諸佛所說憐愍眾生故諸族姓子優曇鉢花可為易得此陀羅尼句實難出生諸族姓子此陀羅尼句又為易出若當受持此陀羅尼及讀誦者亦復甚難諸族姓子佛出於世是為不難此陀羅尼出現甚難諸族姓子若有人為在阿鼻地獄眾生造無間者誹謗正法者住世一劫為利益彼眾生故誦此陀羅尼句二十一日晝三夜三日日溫習於彼之時阿鼻大地獄以陀羅尼威神力故破毀百叚彼等眾生即得解脫何況閻浮提人輩若觸耳門者彼等應作如是知我等已被四如來攝受及四菩薩并日月二天攝受於此中莫生疑惑多緻他一度致二摩訶度那致三素嚧素嚧四莎呵叔迦邏毘輸達膩一多羅多羅二莎呵殊帝一鉢囉地閉二妬嚧妬嚧三莎呵鉢頭摩摩利膩一薩著典迦反二何邏多佛第三胡嚧胡嚧四莎呵薩著典迦反佛第一薩著同上音盧迦膩二翅吉豉反唎翅唎三莎呵陀羅尼佛第一阿波囉底呵多佛第二妬嚧妬嚧三莎訶羅引利那質底一徒摩鉢唎呵唎二叩庫嚧庫嚧三莎呵陀邏陀邏摩訶陀羅一達邏達邏闍延底裔二莎呵諸此莎聲皆平而長諸此呵聲悉去而急蘇拔囉底一蘇多閉二阿波囉帝三呵多佛第四陀囉陀囉陀囉陀囉五延帝裔南無智炬如來南無金剛積形如來南無實言如來南無可畏音震王諸如來等莎呵南無月光童子多緻他一鉢囉婆引迦唎二鉢囉婆引跋帝三達摩毘輸第四羯磨毘輸第五婆婆鬪迷去六莎呵若有人日常誦者一切業障皆得清淨南無寂光王如來多緻他一傷帝傷帝二阿邏伽三叉引耶余歌反夜余賀反諸耶夜悉同此反四傷底傷底五垤徒結反鞞莎六叉耶引夜七傷帝傷謨訶叉耶夜八多緻他一眸𡀔𡀔二眸𡀔𡀔三阿婆呵眸𡀔𡀔四毘闍叉耶夜五莎呵若人長誦此呪晝三夜三彼等眾罪速盡無餘南無勝栴檀香體如來多緻夜他諸此多音皆作怛緻音皆地夜反他皆去聲一脂囉長帝二摩唎至翅皆吉豉反三突唎馱迷去四途囉奴五鉢囉鞞殺吒去六栴檀囊長岐去七栴檀那健平而長第八栴檀那揭鞞九栴檀那復誓十毘輸達尼去十一遮唎多引囉引拔帝十二薩婆怛他伽多十三提引瑟鬚帝三聲聯疾急十四莎呵此陀羅尼章句一切諸佛之所宣說解釋隨喜若有善男子善女人持此陀羅尼者於諸鬼神得無所畏轉此一生覩彌陀佛復得對面見觀世音及見月光童子從一勝處至一勝處諸善法中遇善知識若其女人得轉女身所謂是彼栴檀香體如來威力復得無邊菩薩勝處南無月上如來南無作光明菩薩多緻他一達唎達唎二陀囉膩三胒女一反陀膩四阿婆夜羯邏閉五迦辣波鞞伽帝六暗烏臘反米履多米已下三字疾急道七迦辣波八胡多貰膩九阿難多目企十閈十阿難多斫芻伽帝十一唵重聲長引婦十二莎呵十三善男子此陀羅尼章句恒河沙諸佛世尊所說住持隨喜為令墮諸惡趣眾生生利益故善男子若有菩薩受持此陀羅尼彼人超越八種恐怖所謂無邊地獄恐怖無邊畜生恐怖無邊餓鬼恐怖無邊受胎恐怖無邊生恐怖無邊老恐怖無邊病恐怖無邊死恐怖十方諸佛皆念彼人命終之時心不錯亂面對諸佛受生當得無盡之身亦復得於調伏諸根南無婆伽婆辯幢如來南無寶火如來南無大目如來南無法界形如來多緻他一達唎達唎並上聲二達摩陀妬三鉢囉上底瑟恥勅履反帝四莎呵南無諸方燈明王如來多緻他一鉢囉遞閉鉢囉遞徒履反閉二折時列反若女迦反那引迦鉢囉上地閉三莎呵四南無悲威如來多緻他一坻低誓坻誓二折時列反若女迦反那坻誓三佛陀坻誓四達摩坻誓五僧伽坻誓六莎呵南無梵海如來多緻他一婆囉帝婆囉帝二薩婆跋囉上多鉢利不平唎泥去三佛陀達唎舍泥四莎呵南無忍圓滿燈如來一千五百七十多緻他一器那器那二薩婆達摩三婆囉拏膩四字並去聲四佛陀薩鱣知栖反那去五達摩薩鱣那六僧伽薩鱣那七莎呵南無法圓光如來多緻他一栴達囉鉢囉鞞二蘇利耶鉢囉鞞三栴達囉蘇利耶四設多索呵薩囉頞帝五奚唎迦六鉢囉鞞七毘輸陀夜八闍若女何反斫芻九莎呵南無無畏莊嚴如來多緻他一達摩毘喻二字連聲道下同醯二伽伽那毘喻醯莎呵三闍若那毘喻醯四莎呵南無寂光王如來多緻他一陀囉陀囉二闍若如齊反耶三鉢唎輸引達泥去四闍若女迦反那鉢唎富囉泥去五多他哆阿婆菩引達泥去六尸伽濫七莎呵南無廣名稱如來多緻他一毘不羅瞿折之列反唎二伽伽那瞿折之列反唎三不囉耶不囉耶薩婆奢引四阿提瑟恥勅一反下同五帝佛陀阿提瑟恥帝六薩婆菩提薩埵提瑟恥帝七莎呵南無法海波濤功德王如來多緻他一鞞佶耆一反易羊豉反二下悉同達摩三謨達囉鞞佶易三伽伽那三謨達囉鞞佶易四佛陀三謨達囉鞞佶易五菩提薩埵達摩三謨達囉鞞佶易六波羅蜜多鞞佶易七薩婆奢鉢唎哺囉拏去鞞佶易八佛陀提瑟恥帝九莎呵此諸佛等往昔行菩薩行時作如是願我等證菩提已若有眾生聞我等名受持淨信彼等皆得住不退轉超越過於八不閑處諸佛菩薩皆悉護念住持往生清淨佛剎捨彼命已一切諸天皆當守護過諸怖畏若復有人持如是等諸佛名字及陀羅尼偈頌章句憶念不忘彼若欲見彌勒菩薩彼人應誦此陀羅尼一十萬遍隨力供養若欲見普賢菩薩彼人應誦二十萬遍隨力供養若復欲見毘盧遮那如來彼人誦三十萬遍隨力供養得淨心已發慈愍心捨諸我慢瞋恚嫉妬忿恨諸患等南無因無邊光明功德威形如來多緻他一脩利易以豉反二脩利易三若那脩利易四莎呵南無種種威力多王功德形如來多緻他一尸利尸利坻闍尸利二莎呵南無阿僧祇俱致劫修習覺如來多緻他一三牟陀曳二三牟陀曳三若那三牟陀曳四莎呵南無諸法遊戲威形如來多緻他一揭其謁反薜步計反二揭薜三若那揭薜四莎呵南無妙金虛空形如來多緻他一伽伽泥去二伽伽泥三伽伽那毘輸四莎呵南無寶彌留如來多緻他一彌留去彌留二阿辣那彌留三莎呵南無瞿那海如來多緻他一瞿泥去瞿泥二瞿那三目提黎三莎呵南無法界音幢如來多緻他一吱吉支反二駐吱駐三若那吱駐四莎呵南無法海能雷如來多緻他一三目提離二三目提離三若那三目提離四莎呵南無法幢如來多緻他一陀婆提陀婆提二達摩陀婆提三莎呵南無地威如來多緻他一陀離陀離二陀羅尼三勿提離三莎呵南無法力光如來多緻他一波羅避波羅避二達摩波羅避三莎呵南無虛空覺正如來多緻他一佛提佛提二蘇佛提三莎呵南無彌留峯明如來一千六百多緻他一頞利脂頞利脂二若那頞利脂三莎呵南無雲峯如來多緻他一迷引祇迷祇二摩訶迷祇三莎呵南無日燈幢峯如來多緻他一波羅地庇邊豉反下同二波羅地庇三若那波羅地庇四莎呵南無剎證覺如來多緻他一娑彌娑彌二三摩娑地帝多豉反莎呵南無樹王如來多緻他一度盧迷去二度盧迷去三若那度盧迷去四莎呵南無瞿那彌留如來多緻他一瞿泥去二瞿泥去三瞿那泥迷四彌留尸佉離五莎呵南無三寶如來多緻他一尼彌去二尼彌三若那尼彌去四莎呵南無毘盧遮那如來多緻他一毘梨毘梨二毘盧遮泥去三莎呵南無光莊嚴如來多緻他一毘引右醯毘右醯二若女何反那毘右醯三莎呵南無法海如來多緻他一三摩三摩二三眸達囉毘迦囉滿泥三莎呵南無威頭如來多緻他一低闍低闍二若那低闍三莎呵南無世間主如來多緻他一因引垤徒結反利因引坻唎二因達羅毘迦囉彌去莎呵南無威賢功德如來多緻他一跋地隷二跋地隷三須跋地隸四莎呵南無諸法光王如來多緻他一波引囉避波囉避二若那波囉避三莎呵南無金剛寶齊如來多緻他一婆嗜離婆嗜離二婆闍盧怛離三莎呵南無持無礙力如來多緻他一阿僧祇二阿僧祇三阿僧伽佛提四莎呵南無法界形如來多緻他一達唎迷去二達唎迷去三達摩達唎四莎呵南無諸方燈明王如來多緻他一推泥推泥二遲那迦唎三莎呵南無悲威德如來多緻他一低視低視二摩訶低視三莎呵南無梵海如來多緻他一婆囉帝婆囉帝二婆囉多鉢唎不囉泥去三莎呵南無忍圓燈明如來多緻他一懺迷二悉去聲懺迷三若女何反那懺迷四莎呵南無法圓光如來多緻他一薩囉薩囉二薩婆佛陀三提瑟呹耻一反帝四莎呵南無寂光王如來羶詩安反下悉同帝一鉢囉羶帝二憂波羶帝三莎呵
